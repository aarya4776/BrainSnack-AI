<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainSnack AI</title>
    <meta name="description" content="A premium AI study assistant for summarisation, explanations, and discovery.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-mark">🧠</span>
                    <span class="logo-text">BrainSnack</span>
                </div>
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    New Chat
                </button>
            </div>

            <div class="sidebar-section-label">Recents</div>
            <div id="chat-history" class="chat-history">
                <!-- History items injected via JS -->
            </div>

            <div class="sidebar-footer">
                <button id="settings-btn" class="sidebar-action-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    Settings
                </button>
            </div>
        </aside>

        <!-- Main Area -->
        <main id="main">
            <button id="sidebar-toggle" class="sidebar-toggle-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>

            <div id="chat-window" class="chat-window">
                <!-- Welcome screen or messages injected here -->
            </div>

            <!-- Floating Input Bar -->
            <div class="input-wrapper">


                <div class="input-container">
                    <div class="controls-bar">
                        <div class="mode-group">
                            <button class="mode-btn active" data-mode="auto"> Auto</button>
                            <button class="mode-btn" data-mode="summarise">📋 Summarise</button>
                            <button class="mode-btn" data-mode="explain">💡 Explain</button>
                            <button class="mode-btn" data-mode="funfact">⚡ Fun Fact</button>
                        </div>

                        <div id="detail-group" class="detail-group">
                            <button class="detail-btn active" data-detail="short">Short</button>
                            <button class="detail-btn" data-detail="detailed">Detailed</button>
                        </div>
                    </div>

                    <div class="textarea-wrapper">
                        <textarea id="user-input" placeholder="Ask BrainSnack anything..." rows="1"></textarea>
                        <div class="action-buttons">

                            <button id="send-btn" class="send-btn" title="Send message">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13" />
                                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="input-footer">
                    BrainSnack can make mistakes. Verify important info.
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="modal-overlay" class="modal-overlay hidden"></div>
    <div id="settings-modal" class="modal hidden">
        <div class="modal-header">
            <h2>Settings</h2>
            <button id="modal-close-btn" class="modal-close-btn">✕</button>
        </div>
        <div class="modal-body">
            <div class="setting-block">
                <label class="setting-label">OpenRouter API Key</label>
                <div class="api-key-field">
                    <input type="password" id="api-key-input" class="setting-input" placeholder="Enter API Key...">
                    <button id="toggle-key-vis" class="vis-toggle">👁️</button>
                </div>
                <div class="api-test-row">
                    <button id="test-api-btn" class="test-btn">Test API Connection</button>
                    <p class="setting-hint">Get your key from <a href="https://openrouter.ai/keys"
                            target="_blank">OpenRouter</a></p>
                </div>
                <div id="available-models" class="available-models hidden">
                    <!-- Models will be listed here -->
                </div>
            </div>

            <div class="setting-block">
                <label class="setting-label">AI Model</label>
                <select id="model-select" class="setting-select">
                    <option value="auto">OpenRouter Free Pool (Auto-Switch)</option>
                </select>
            </div>
            <div class="setting-block">
                <label class="setting-label">SERPER API KEY</label>
                <div class="api-key-field">
                    <input type="password" id="serper-key-input" class="setting-input"
                        placeholder="Enter Serper API key">
                    <button id="toggle-serper-vis" class="vis-toggle">👁️</button>
                </div>
                <div class="api-test-row">
                    <button id="test-serper-btn" class="test-btn">Test Serper Connection</button>
                    <p class="setting-hint">Get your key from <a href="https://serper.dev"
                            target="_blank">Serper.dev</a></p>
                </div>
                <div id="serper-test-result" class="available-models hidden">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button id="save-settings" class="save-btn">Save Preferences</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
